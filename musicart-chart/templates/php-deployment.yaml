apiVersion: apps/v1
kind: Deployment
metadata:
  name: php
spec:
  replicas: {{ .Values.replicaCount.php }}
  selector:
    matchLabels:
      app: php
  template:
    metadata:
      labels:
        app: php
    spec:
      containers:
      - name: php
        image: {{ .Values.images.php }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
        env:
        - name: APP_ENV
          value: {{ .Values.php.appEnv | quote }}
        - name: CORS_ALLOW_ORIGIN
          value: {{ .Values.php.corsAllowOrigin | quote }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: php-secret
              key: DATABASE_URL
        - name: JWT_PASSPHRASE
          valueFrom:
            secretKeyRef:
              name: php-secret
              key: JWT_PASSPHRASE
        volumeMounts:
        - name: jwt-keys
          mountPath: /code/config/jwt
          readOnly: true
      volumes:
      - name: jwt-keys
        secret:
          secretName: jwt-secret
