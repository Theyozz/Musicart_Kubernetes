{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: php-allow-from-nginx
spec:
  podSelector:
    matchLabels:
      app: php
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx-backend
      ports:
        - protocol: TCP
          port: 9000
{{- end }}
